{% extends "base.html" %}
{% block title %}Login | MedTrack{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">&#9877;</div>
      <h2>Welcome Back</h2>
      <p class="auth-sub">Log in to access the doctor directory</p>
    </div>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="auth-form">
      {% csrf_token %}

      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" id="id_username" name="username" placeholder="Your username" required />
      </div>

      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" id="id_password" name="password" placeholder="Your password" required />
      </div>

      <button type="submit" class="btn-primary btn-full">Log In</button>
    </form>

    <p class="auth-footer">New doctor? <a href="{% url 'register_step1' %}">Register here</a></p>
  </div>
</div>
{% endblock %}
