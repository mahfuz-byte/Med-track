{% extends "base.html" %}
{% block title %}Password Reset Complete | MedTrack{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card text-center">
    <div class="pending-icon">&#9989;</div>
    <h2>Password Updated!</h2>
    <p class="auth-sub">
      Your password has been successfully reset.<br />
      You can now log in with your new password.
    </p>
    <a href="{% url 'login' %}" class="btn-primary mt-2">Log In</a>
  </div>
</div>
{% endblock %}
